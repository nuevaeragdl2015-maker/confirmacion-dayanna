<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Confirmación de Asistencia</title>

<style>
body {
  margin: 0;
  font-family: 'Georgia', serif;
  background: linear-gradient(135deg, #f5f0eb, #e8dcd1);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
}

.box {
  background: #ffffff;
  padding: 50px 35px;
  border-radius: 25px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.2);
  text-align: center;
  width: 92%;
  max-width: 450px;
}

h2 {
  font-size: 26px;
  margin-bottom: 10px;
  font-weight: normal;
}

.sub {
  font-size: 16px;
  color: #777;
  margin-bottom: 25px;
}

input {
  width: 100%;
  padding: 14px;
  margin: 10px 0;
  border-radius: 12px;
  border: 1px solid #ddd;
  font-size: 16px;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 12px;
  border-radius: 12px;
  border: none;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

.confirmar {
  background: #25D366;
  color: white;
}

.confirmar:hover {
  background: #1ebe5d;
}

.no {
  background: #e74c3c;
  color: white;
}

.no:hover {
  background: #c0392b;
}
</style>

</head>

<body>

<div class="box">
  <h2>Confirmación</h2>
  <div class="sub">Nos encantará contar con tu presencia</div>

  <input type="text" id="nombre" placeholder="Tu nombre">

  <button class="confirmar" onclick="confirmar()">Confirmar asistencia</button>
  <button class="no" onclick="noAsistire()">No podré asistir</button>
</div>

<script>
var telefono = "523316041358";

function confirmar() {
  var nombre = document.getElementById("nombre").value.trim();

  if(nombre === "") {
    alert("Por favor escribe tu nombre");
    return;
  }

  var mensaje = "Hola, soy " + nombre +
  ". Confirmo mi asistencia a la fiesta de XV años de Dayanna. Muchas gracias por la invitación.";

  abrirWhats(mensaje);
}

function noAsistire() {
  var nombre = document.getElementById("nombre").value.trim();

  if(nombre === "") {
    alert("Por favor escribe tu nombre");
    return;
  }

  var mensaje = "Hola, soy " + nombre +
  ". Agradezco mucho la invitación, pero en esta ocasión no podré asistir.";

  abrirWhats(mensaje);
}

function abrirWhats(mensaje){
  var url = "https://wa.me/" + telefono + "?text=" + encodeURIComponent(mensaje);
  window.open(url, "_blank");
}
</script>

</body>
</html>
