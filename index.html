<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Confirmación de Asistencia</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f7f7f7;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .box {
      background: #fff;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
      text-align: center;
      width: 300px;
    }
    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
    }
    button {
      background: #25D366;
      color: white;
      border: none;
      padding: 12px;
      width: 100%;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }
    button:hover {
      background: #1ebe5d;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>Confirmar Asistencia</h2>

  <input type="text" id="nombre" placeholder="Tu nombre">

  <button onclick="enviarWhatsApp()">Confirmar por WhatsApp</button>
</div>

<script>
function enviarWhatsApp() {
  var nombreInput = document.getElementById("nombre");

  if (!nombreInput || nombreInput.value.trim() === "") {
    alert("Por favor escribe tu nombre");
    return;
  }

  var nombre = nombreInput.value;

  var telefono = "523316041358";

  var mensaje = "Hola, soy " + nombre + 
                ". Muchas gracias por la invitación, confirmo mi asistencia a la fiesta de XV años  de Dayanna.";

  var url = "https://wa.me/" + telefono + "?text=" + encodeURIComponent(mensaje);

  window.open(url, "_blank");
}
</script>

</body>
</html>
